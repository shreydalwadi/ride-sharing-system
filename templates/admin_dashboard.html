<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app">

<div class="sidebar">
<h2>RideShare</h2>
<a href="/admin/dashboard">Dashboard</a>
<a href="/admin/history">Ride History</a>
<a href="/logout">Logout</a>
</div>

<div class="main">

<div class="topbar">
Welcome Admin, {{ session.name }}
</div>

<div class="card">
<h3>Add User</h3>

<form action="/admin/add_user" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="text" name="mobile" placeholder="Mobile" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<select name="role" required>
<option value="">Role</option>
<option value="driver">Driver</option>
<option value="passenger">Passenger</option>
</select>
<input type="text" name="vehicle_number" placeholder="Vehicle No">
<button type="submit">Add</button>
</form>
</div>

<div class="card">
<h3>Registered Users</h3>
<table>
<tr>
<th>ID</th><th>Name</th><th>Role</th><th>Email</th><th>Action</th>
</tr>
{% for user in users %}
<tr>
<td>{{ user.id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.role }}</td>
<td>{{ user.email }}</td>
<td>
{% if user.role != "admin" %}
<a href="/admin/delete_user/{{ user.id }}" class="delete-btn">Delete</a>
{% endif %}
</td>
</tr>
{% endfor %}
</table>
</div>

</div>
</div>
</body>
</html>
